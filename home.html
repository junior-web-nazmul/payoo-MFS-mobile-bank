<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- fontawosome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <!-- daisy ui CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-[#F4F5F7]  ">
    <!-- payoo dasboard -->
    <div class="max-w-lg mx-auto flex justify-between items-center border-b-1 border-gray-400 p-4">
        <div class="flex justify-center items-center">
            <span><img src="./assets/Group.png" alt=""></span>
            <div>
                <h2 class="font-extrabold text-sm ">$<span id="available-balance">450000</span></h2>
                <p class="text-[#08080880]">Available Balance</p>
            </div>
        </div>
        <div>
            <button class="btn text-[#08080880]">
                <span class="rotate-180">
                    <i class="fa-solid fa-arrow-right-from-bracket text-gray-700"></i>
                </span> Log Out
            </button>
        </div>
    </div>

    <div class="max-w-lg mx-auto bg-white p-8 rounded-b-2xl">
        <div class=" mt-3">
            <h1 class="font-bold text-2xl mb-3">
                🔥 Welcome to Payooo!
            </h1>
            <p class=" text-[#08080880]">
                Enjoy easy and convenient financial services with us. <br> Cashout charge is low and
            </p>
        </div>

        <div class="mt-8 grid grid-cols-3 grid-rows-2 gap-4">
            <div id="add-money-parent" class="border-2 border-gray-200  rounded-lg p-3">
                <img src="./assets/wallet1.png" class="mx-auto" alt="">
                <h2 class="text-center">Add Money</h2>
            </div>
            <div id="cashout-parent" class="border-2 border-gray-200  rounded-lg p-3">
                <img src="./assets/send1.png" class="mx-auto" alt="">
                <h2 class="text-center">Cash Out</h2>
            </div>
            <div class="border-2 border-gray-200  rounded-lg p-3">
                <img src="./assets/money1.png" class="mx-auto" alt="">
                <h2 class="text-center">Transfer Money</h2>
            </div>
            <div class="border-2 border-gray-200  rounded-lg p-3">
                <img src="./assets/bonus1.png" class="mx-auto" alt="">
                <h2 class="text-center">Get Bonus</h2>
            </div>
            <div class="border-2 border-gray-200  rounded-lg p-3">
                <img src="./assets/purse1.png" class="mx-auto" alt="">
                <h2 class="text-center">Pay Bill</h2>
            </div>
            <div class="border-2 border-gray-200  rounded-lg p-3">
                <img src="./assets/transaction1.png" class="mx-auto" alt="">
                <h2 class="text-center">Transaction</h2>
            </div>
        </div>
    </div>

    <div class="all-form-section max-w-lg mx-auto p-8">
        <!-- add money -->
        <div id="add-money-container" style="display: none;">
            <h1 class="mb-3 font-semibold text-sm">Add Money</h1>
            <form action="" class="bg-white p-8 rounded-2xl">
                <div>
                    <h2 class="font-medium text-[#080808B3]">Select A Bank</h2>
                    <select id="bank" class="select bg-[#F4F5F7] my-3 w-full rounded-[30px] text-gray-600">
                        <option disabled selected>Select bank</option>
                        <option>AB Bank</option>
                        <option>Asia Bank</option>
                        <option>Sonali Bank</option>
                        <option>Trust Bank</option>
                        <option>UCB Bank</option>
                        <option>Dutch Bangla Bank</option>
                    </select>
                </div>

                <div>
                    <label class="font-medium text-[#080808B3]" for="">Bank Account Number</label>
                    <br>
                    <input id="account-number" type="text" placeholder="Enter 13 digit account number"
                        class="input bg-[#F4F5F7] w-full  my-3 rounded-[30px]" />
                </div>

                <div>
                    <label class="font-medium text-[#080808B3]" for="">Amount to Add</label>
                    <br>
                    <input id="add-amount" type="text" placeholder="Add Amount to withdraw"
                        class="input bg-[#F4F5F7] w-full my-3 rounded-[30px]" />
                </div>

                <div>
                    <label class="font-medium text-[#080808B3]" for="">Pin Number</label>
                    <br>
                    <input id="add-pin" type="text" placeholder="Enter 4 Digit Pin Number"
                        class="input bg-[#F4F5F7] w-full mt-3 rounded-[30px]" />
                </div>
                <button id="btn-add"
                    class="btn bg-[#0874F2] mt-3 w-full font-semibold text-sm text-white rounded-[32px] ">Add
                    Money</button>
            </form>
        </div>

        <div id="cashout-container">
            <h1 class="mb-3 font-semibold text-sm">Cash Out</h1>
        </div>
    </div>
    <script src="./home.js"></script>
</body>

</html>
