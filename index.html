<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo MFS Bank</title>
    <!-- daisy ui CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-[#F4F5F7]  h-[100vh] flex flex-col justify-center items-center">
    <div class="h-[130px] w-[300px]  flex justify-center items-center bg-[url(./assets/bg.png)] bg-cover">
        <img src="./assets/Group.png" alt="">
    </div>
    <form class=" bg-white p-8 rounded-2xl w-[350px]">
        <div>
            <label class="font-medium" for="">Mobile Number</label>
            <br>
            <input id="mobile-number" type="text" placeholder="Enter your number"
                class="input bg-[#F4F5F7]  my-3 rounded-[30px]" />
        </div>
        <div>
            <label class="font-medium" for="">4 Digit Pin</label>
            <br>
            <input id="pin-number" type="text" placeholder="Enter 4 Digit Pin"
                class="input bg-[#F4F5F7]  mt-3 rounded-[30px]" />
        </div>
        <button id="btn-login" class="btn bg-[#0874F2] mt-3 w-full text-white rounded-[32px] ">Login</button>
    </form>

    <!-- js script -->
    <script src="./script.js"></script>
</body>

</html>
